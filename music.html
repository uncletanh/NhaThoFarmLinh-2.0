<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <script>const savedTheme = localStorage.getItem('theme');if(savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.setAttribute('data-theme', 'dark');}</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music | Nhà Thơ Farm Lính</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css?v=3.0">
</head>

<body>
    <div class="ambient-bg" id="ambient-bg"></div>
    <header class="site-header">
        <div class="nav-container">
            <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Menu">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <a href="index.html" class="site-brand">Nhà Thơ Farm Lính</a>
            <nav class="site-nav" id="site-nav">
                <a href="index.html" data-i18n="navHome">Home</a>
                <a href="poetry.html" data-i18n="navPoetry">Poetry</a>
                <a href="thoughts.html" data-i18n="navThoughts">Thoughts</a>
                <a href="quotes.html" data-i18n="navQuotes">Quotes</a>
                <a href="music.html" class="active" data-i18n="navMusic">Music</a>
                <a href="archive.html" data-i18n="navArchive">Archive</a>
                <a href="about.html" data-i18n="navAbout">About</a>
            </nav>
            <div class="header-toggles">
                <button id="lang-toggle" class="theme-toggle lang-toggle-btn" aria-label="Toggle language">EN</button>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <svg viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="page-content">
        <div class="music-page-wrapper">
            <div class="player-artwork-container">
                <canvas id="audio-visualizer" class="audio-visualizer"></canvas>
                <img id="main-artwork" src="" alt="Album Art" class="player-artwork" crossorigin="anonymous">
            </div>

            <div class="player-info-controls">
                <h1 id="main-title" class="player-title">Select a track</h1>
                <p id="main-artist" class="player-artist">Original Compositions</p>

                <div class="seek-bar-container">
                    <span id="time-current">0:00</span>
                    <input type="range" id="seek-bar" class="seek-bar" value="0" min="0" step="1">
                    <span id="time-total">0:00</span>
                </div>

                <div class="main-controls">
                    <button id="btn-shuffle" class="ctrl-main-btn" aria-label="Shuffle">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                    </button>
                    
                    <button id="btn-prev" class="ctrl-main-btn" aria-label="Previous">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
                    </button>

                    <button id="btn-play-pause" class="ctrl-main-btn play-pause-huge" aria-label="Play/Pause">
                        <svg id="icon-play" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        <svg id="icon-pause" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                    </button>

                    <button id="btn-next" class="ctrl-main-btn" aria-label="Next">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
                    </button>

                    <button id="btn-loop" class="ctrl-main-btn" aria-label="Loop">
                        <!-- Default loop icon -->
                        <svg id="icon-loop" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                        <!-- Loop one icon -->
                        <svg id="icon-loop-one" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path><text x="12" y="16" font-size="10" font-family="sans-serif" font-weight="bold" fill="currentColor" stroke="none" text-anchor="middle">1</text></svg>
                    </button>
                </div>

                <div class="extra-controls">
                    <div class="volume-container">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        <input type="range" id="volume-bar" class="volume-bar" value="100" min="0" max="100">
                    </div>
                    <div class="advanced-toggles">
                        <button id="btn-lyrics" class="ctrl-sub-btn" aria-label="Lyrics" title="Live Lyrics">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        </button>
                        <button id="btn-crossfade" class="ctrl-sub-btn" aria-label="Toggle Crossfade" title="Crossfade (Fade out/Fade in)">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
                        </button>
                        <button id="btn-pip" class="ctrl-sub-btn" aria-label="Mini Player" title="Mini Player">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="12" y="14" width="7" height="5"></rect></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div id="lyrics-panel" class="lyrics-panel hidden">
                <div id="lyrics-content" class="lyrics-content"></div>
            </div>
        </div>

        <div class="dedicated-playlist">
            <div id="playlist-container"></div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p data-i18n="footerText">&copy; 2026 Notebook. Crafted with minimal intent.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script src="js/dataMusic.js?v=3.0"></script>
    <script src="js/i18n.js?v=3.0"></script>
    <script src="js/script.js?v=3.0"></script>
    <script src="js/musicPlayer.js?v=3.0"></script>
</body>

</html>
