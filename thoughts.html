<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <script>const savedTheme = localStorage.getItem('theme');if(savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.setAttribute('data-theme', 'dark');}</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoughts | Notebook</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css?v=2.2">
    
    <style>
        .thought-content {
            display: none;
            margin-top: 1.5rem;
            color: var(--text-primary);
            font-size: 1.15rem;
            line-height: 1.8;
            font-family: var(--font-serif);
        }
        
        .thought-content p {
            margin-bottom: 1.5rem;
        }

        .list-item.reading .thought-content {
            display: block;
        }
        
        .list-item.reading .list-item-preview {
            display: none;
        }

        .read-toggle {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            color: var(--text-primary);
            background-color: transparent;
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 1.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            transition: var(--transition-smooth);
        }
        .read-toggle:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="nav-container">
            <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Menu">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <a href="index.html" class="site-brand">NhĂ  ThÆ¡ Farm LĂ­nh</a>
            <nav class="site-nav" id="site-nav">
                <a href="index.html" data-i18n="navHome">Home</a>
                <a href="poetry.html" data-i18n="navPoetry">Poetry</a>
                <a href="thoughts.html" class="active" data-i18n="navThoughts">Thoughts</a>
                <a href="quotes.html" data-i18n="navQuotes">Quotes</a>
                <a href="archive.html" data-i18n="navArchive">Archive</a>
                <a href="about.html" data-i18n="navAbout">About</a>
            </nav>
            <div class="header-toggles">
                <button id="lang-toggle" class="theme-toggle lang-toggle-btn" aria-label="Toggle language">EN</button>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <svg viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="page-wrapper container">
        <h1 class="section-title" data-i18n="thoughtsCollectionTitle">Collected Thoughts</h1>
        
        <div class="search-container" style="margin-bottom: 3rem;">
            <input type="text" id="thoughts-search" class="search-input" placeholder="Search essays..." autocomplete="off">
        </div>

        <div id="thoughts-list">
            <!-- Thoughts injected here -->
        </div>
    </main>

    <footer class="site-footer">
        <p data-i18n="footerText">&copy; 2026 Notebook. Crafted with minimal intent.</p>
    </footer>

    <script src="js/dataThoughts.js?v=2.2"></script>
    <script src="js/i18n.js?v=2.2"></script>
    <script src="js/script.js?v=2.2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const thoughtsList = document.getElementById('thoughts-list');
            const searchInput = document.getElementById('thoughts-search');
            let currentSearch = '';

            searchInput.addEventListener('input', (e) => {
                currentSearch = e.target.value.toLowerCase().trim();
                renderThoughts();
            });

            function renderThoughts() {
                thoughtsList.innerHTML = '';
                if (thoughts) {
                    const filtered = thoughts.filter(t => {
                        if(!currentSearch) return true;
                        return t.title.toLowerCase().includes(currentSearch) || t.content.toLowerCase().includes(currentSearch);
                    });

                    filtered.forEach(t => {
                        const el = document.createElement('div');
                        el.className = 'list-item fade-in visible';
                        el.id = t.id;
                        const readText = window.currentLangDict?.readEssay || 'Read Essay';
                        const collapseText = window.currentLangDict?.collapsePoem || 'Collapse';
                        // Strip HTML tags from content for Zen mode since we use textContent
                        const rawText = t.content.replace(/<[^>]*>?/gm, '');

                        el.innerHTML = `
                            <div class="list-item-date">${t.date}</div>
                            <h2 class="list-item-title">${t.title}</h2>
                            <p class="list-item-preview">${t.preview}</p>
                            <div class="thought-content">${t.content}</div>
                            <div><button class="read-toggle">${readText}</button></div>
                        `;
                        // Button Logic: Handle both Hash Expanding and Zen Mode
                        el.querySelector('.read-toggle').addEventListener('click', (e) => {
                            if (el.classList.contains('reading')) {
                                el.classList.remove('reading');
                                e.target.textContent = readText;
                            } else {
                                if (window.openZenMode) {
                                    window.openZenMode(t.title, rawText);
                                }
                            }
                        });

                        thoughtsList.appendChild(el);
                    });
                }
            }

            // Initial render
            if (window.currentLangDict) {
                renderThoughts();
            } else {
                setTimeout(renderThoughts, 50); // Small buffer to ensure dictionary load
            }
            
            // Re-render on language toggle
            window.addEventListener('languageChanged', renderThoughts);

            // Handle hash links from homepage
            if (window.location.hash) {
                const targetId = window.location.hash.substring(1);
                setTimeout(() => {
                    const targetEl = document.getElementById(targetId);
                    if (targetEl) {
                        if(window.openZenMode) {
                            const t = thoughts.find(x => x.id === targetId);
                            if(t) window.openZenMode(t.title, t.content.replace(/<[^>]*>?/gm, ''));
                        } else {
                            targetEl.classList.add('reading');
                            targetEl.querySelector('.read-toggle').textContent = 'Collapse';
                            targetEl.scrollIntoView({ behavior: 'smooth' });
                        }
                    }
                }, 100);
            }
        });
    </script>
</body>
</html>
